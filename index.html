<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Arrecadação Ailog - CLOUD v13</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-size: 0.7rem; }
        .row-blue { background-color: #dbeafe !important; }
        .row-green { background-color: #dcfce7 !important; }
        .row-red { background-color: #fee2e2 !important; }
        .table-container { max-height: 75vh; overflow-y: auto; }
        .cnpj-cell { cursor: pointer; text-decoration: underline; color: #2563eb; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-100 p-2">

    <div class="max-w-[100%] mx-auto">
        <header class="flex justify-between items-center mb-2 bg-white p-3 rounded shadow-sm border-b-2 border-blue-600">
            <div class="flex items-center gap-4">
                <h1 class="font-bold text-slate-700 uppercase">Ailog Cloud - Sincronizado</h1>
                <span id="loader" class="text-blue-600 font-bold animate-pulse">Carregando Nuvem...</span>
            </div>
            <div class="flex gap-2">
                <button onclick="baixarDados()" class="bg-blue-600 text-white px-3 py-1 rounded text-[10px] font-bold">🔄 ATUALIZAR</button>
                <button id="btnNaoDisparar" onclick="salvarAcao('VERMELHO')" class="bg-red-600 text-white px-3 py-1 rounded text-[10px] hidden">NÃO DISPARAR (<span class="countSel">0</span>)</button>
                <button id="btnEmailEnviado" onclick="salvarAcao('VERDE')" class="bg-green-600 text-white px-3 py-1 rounded text-[10px] hidden">E-MAIL ENVIADO (<span class="countSel">0</span>)</button>
            </div>
        </header>

        <div class="grid grid-cols-3 gap-2 mb-2 bg-white p-2 rounded shadow-sm">
            <select id="filtroAnalista" onchange="render()" class="border rounded p-1 outline-none">
                <option value="todos">Todos os Analistas</option>
            </select>
            <input type="text" id="busca" oninput="render()" placeholder="Busca rápida..." class="border rounded p-1 outline-none">
            <div class="flex items-center justify-end font-bold text-blue-800" id="resumo">Aguardando...</div>
        </div>

        <div id="mainTable" class="bg-white rounded shadow-sm table-container hidden">
            <table class="min-w-full border-collapse">
                <thead>
                    <tr class="text-[9px] text-slate-500 uppercase bg-slate-50">
                        <th class="w-8 p-2"><input type="checkbox" id="selectAll" onchange="toggleAll(this.checked)"></th>
                        <th class="w-24 text-left p-2">CNPJ</th>
                        <th class="text-left p-2">RAZÃO SOCIAL</th>
                        <th class="w-24 text-left p-2">RESPONSÁVEL</th>
                        <th class="w-16 text-center p-2">STATUS</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-[10px]"></tbody>
            </table>
        </div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbx7ZgKnvRz4OL4MhgNUEgVSy0ko3RoN5rQQx9A2T1TNHkS3rcmlsVxZgE8BK6nl3LM7_Q/exec";
        let dados = [];

        async function baixarDados() {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const r = await fetch(URL_SCRIPT);
                dados = await r.json();
                
                // Popular filtro de analistas
                const analistas = [...new Set(dados.map(d => d['USUARIO RESPONSAVEL']))].sort();
                const combo = document.getElementById('filtroAnalista');
                combo.innerHTML = '<option value="todos">Todos os Analistas</option>';
                analistas.forEach(a => { if(a) combo.innerHTML += `<option value="${a}">${a}</option>`; });

                document.getElementById('mainTable').classList.remove('hidden');
                document.getElementById('btnEmailEnviado').classList.remove('hidden');
                document.getElementById('btnNaoDisparar').classList.remove('hidden');
                render();
            } catch (e) { alert("Erro ao carregar dados."); }
            document.getElementById('loader').classList.add('hidden');
        }

        function render() {
            const analista = document.getElementById('filtroAnalista').value;
            const termo = document.getElementById('busca').value.toLowerCase();
            const body = document.getElementById('tableBody');
            body.innerHTML = '';

            const filtrados = dados.filter(d => {
                const matchA = analista === 'todos' || d['USUARIO RESPONSAVEL'] === analista;
                const matchB = d.CNPJ.includes(termo) || d['RAZÃO SOCIAL'].toLowerCase().includes(termo);
                const matchStatus = d['STATUS'] === "ATUALIZADO";
                // Arthur vê apenas o que NÃO foi marcado como "VERMELHO" por outros
                const matchAcao = d['ACAO_SISTEMA'] !== "VERMELHO"; 
                return matchA && matchB && matchStatus && matchAcao;
            });

            filtrados.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = `border-b ${row.cor_temp === 'azul' ? 'row-blue' : row['ACAO_SISTEMA'] === 'VERDE' ? 'row-green' : ''}`;
                tr.innerHTML = `
                    <td class="text-center p-2"><input type="checkbox" onchange="updateSel('${row.CNPJ}', this.checked)"></td>
                    <td class="cnpj-cell p-2" onclick="copiar('${row.CNPJ}')">${row.CNPJ}</td>
                    <td class="font-bold p-2">${row['RAZÃO SOCIAL']}</td>
                    <td class="p-2">${row['USUARIO RESPONSAVEL']}</td>
                    <td class="text-center p-2">${row['STATUS']}</td>
                `;
                body.appendChild(tr);
            });
            document.getElementById('resumo').innerText = `PENDENTES: ${filtrados.length}`;
        }

        function updateSel(cnpj, v) {
            const item = dados.find(d => d.CNPJ === cnpj);
            if(item) item.selecionado = v;
            document.querySelectorAll('.countSel').forEach(el => el.innerText = dados.filter(d => d.selecionado).length);
        }

        async function salvarAcao(cor) {
            const selecionados = dados.filter(d => d.selecionado);
            if(selecionados.length === 0) return;

            document.getElementById('loader').classList.remove('hidden');
            for (let item of selecionados) {
                await fetch(URL_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({ cnpj: item.CNPJ, cor: cor })
                });
                item.ACAO_SISTEMA = cor;
                item.selecionado = false;
            }
            render();
            document.getElementById('loader').classList.add('hidden');
            alert("Sincronizado com a Nuvem!");
        }

        function copiar(txt) {
            navigator.clipboard.writeText(txt);
            const item = dados.find(d => d.CNPJ === txt);
            if(item) item.cor_temp = 'azul';
            render();
        }

        function toggleAll(v) {
            const bodyRows = document.querySelectorAll('#tableBody input[type="checkbox"]');
            bodyRows.forEach(cb => cb.checked = v);
            // Lógica simplificada: seleciona todos os visíveis no array original
            // Para produção, iterar apenas nos filtrados
        }

        baixarDados();
    </script>
</body>
</html>
