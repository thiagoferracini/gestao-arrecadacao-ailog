<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Arrecadação Ailog - Precisão de Datas v26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-size: 0.7rem; }
        .row-blue { background-color: #dbeafe !important; color: #1e3a8a; }
        .table-container { max-height: 75vh; overflow-y: auto; border: 1px solid #e5e7eb; }
        th { position: sticky; top: 0; background: #f8fafc; z-index: 10; border-bottom: 2px solid #e2e8f0; padding: 6px !important; }
        td { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-right: 1px solid #f1f5f9; padding: 4px !important; }
        .cnpj-cell { cursor: pointer; text-decoration: underline; color: #2563eb; font-weight: bold; }
        .badge-atraso { background: #b91c1c; color: white; padding: 2px 5px; border-radius: 4px; font-weight: bold; font-size: 9px; }
        .badge-ok { background: #10b981; color: white; padding: 2px 5px; border-radius: 4px; font-weight: bold; font-size: 9px; }
    </style>
</head>
<body class="bg-slate-100 p-2">

    <div class="max-w-[100%] mx-auto">
        <header class="flex flex-wrap justify-between items-center gap-2 mb-2 bg-white p-2 rounded shadow-sm border-b-2 border-red-600">
            <div class="flex items-center gap-4">
                <h1 class="font-bold text-slate-700 uppercase tracking-tight">Fila de Disparo - Cálculo Real de Dias</h1>
                <div id="cronometro" class="text-blue-700 font-mono font-bold bg-blue-50 px-2 py-1 rounded border border-blue-100 text-[10px]">00:00:00</div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="baixarDados()" class="bg-slate-600 text-white px-3 py-1.5 rounded text-[10px] font-bold hover:bg-slate-700">🔄 ATUALIZAR</button>
                <button id="btnModoFiltro" onclick="toggleModoFiltro()" class="bg-white text-slate-700 border border-slate-300 px-3 py-1 rounded text-[10px] font-bold btn-active">👁️ APENAS ATRASADOS (+7D)</button>
                <button onclick="salvarAcao('VERMELHO')" class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700 text-[10px] font-bold shadow-md">NÃO DISPARAR (<span class="countSel">0</span>)</button>
                <button onclick="salvarAcao('VERDE')" class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700 text-[10px] font-bold shadow-md">E-MAIL ENVIADO (<span class="countSel">0</span>)</button>
            </div>
        </header>

        <div id="mainTable" class="bg-white rounded shadow-sm table-container">
            <table class="min-w-full table-fixed border-collapse">
                <thead>
                    <tr class="text-[9px] text-slate-500 uppercase bg-slate-50 font-bold">
                        <th class="w-8 p-1 text-center border-r"><input type="checkbox" id="selectAll" onchange="toggleAll(this.checked)"></th>
                        <th class="w-24 p-1 text-left border-r">CNPJ</th>
                        <th class="p-1 text-left border-r">RAZÃO SOCIAL</th>
                        <th class="w-32 p-1 text-left border-r text-blue-800">REDE</th>
                        <th class="w-24 p-1 text-left border-r">RESPONSÁVEL</th>
                        <th class="w-24 p-1 text-right border-r text-red-600 italic">▼ VALOR PENDENTE</th>
                        <th class="w-24 p-1 text-center font-bold">TEMPO SEM AÇÃO</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-[10px] text-slate-700"></tbody>
            </table>
        </div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzTLydhGGcvI5qAHlBNEP9aX9IEy1RwDJJ8ThhZJI8UwVFe1U-Hx-gImIiSZjWLJxj7ow/exec"; 
        let dados = [];
        let tempoInicio = new Date();
        let apenasAtrasados = true; 

        setInterval(() => {
            const diff = new Date(new Date() - tempoInicio);
            document.getElementById('cronometro').innerText = `${String(diff.getUTCHours()).padStart(2,'0')}:${String(diff.getUTCMinutes()).padStart(2,'0')}:${String(diff.getUTCSeconds()).padStart(2,'0')}`;
        }, 1000);

        async function baixarDados() {
            try {
                const r = await fetch(URL_SCRIPT);
                const raw = await r.json();
                
                // DATA DE HOJE (26/03/2026) fixada para cálculo
                const hoje = new Date(2026, 2, 26); 

                const dadosLimpos = raw.map(obj => {
                    const novoObj = {};
                    Object.keys(obj).forEach(key => { novoObj[key.trim()] = obj[key]; });
                    return novoObj;
                });

                dados = dadosLimpos.filter(r => String(r['STATUS'] || "").toUpperCase() === "ATUALIZADO")
                .map(r => {
                    const dataBruta = r['ULTIMO CONTATO'] || r['ÚLTIMO CONTATO'] || "";
                    const dataC = parseDataAilog(dataBruta);
                    
                    let dif = 0;
                    if (dataC) {
                        const timeDiff = hoje.getTime() - dataC.getTime();
                        dif = Math.floor(timeDiff / (1000 * 3600 * 24));
                    }
                    
                    let valorLimpo = String(r['VALOR PENDENTE'] || "0").replace("R$", "").replace(/\./g, "").replace(",", ".").trim();
                    return { ...r, diasSemAcao: dif, valorNumerico: parseFloat(valorLimpo) || 0, selecionado: false, semData: !dataC };
                })
                .sort((a, b) => b.valorNumerico - a.valorNumerico);

                render();
            } catch (e) { alert("Erro de conexão."); }
        }

        // FUNÇÃO ESPECÍFICA PARA O FORMATO "29/08/2024 13:42"
        function parseDataAilog(val) {
            if (!val || val === "" || val === " ") return null;
            
            try {
                const partes = String(val).split(' '); // Separa a data da hora
                const dataParte = partes[0]; // Pega apenas "29/08/2024"
                const dmy = dataParte.split('/');
                
                if (dmy.length === 3) {
                    const dia = parseInt(dmy[0], 10);
                    const mes = parseInt(dmy[1], 10) - 1; // Mês no JS começa em 0
                    const ano = parseInt(dmy[2], 10);
                    
                    const dataObj = new Date(ano, mes, dia);
                    return isNaN(dataObj.getTime()) ? null : dataObj;
                }
            } catch (e) { return null; }
            return null;
        }

        function render() {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';

            const filtrados = dados.filter(d => {
                const temAcao = d['ACAO_SISTEMA'] === 'VERDE' || d['ACAO_SISTEMA'] === 'VERMELHO';
                return apenasAtrasados ? (d.diasSemAcao > 7 && !temAcao) : !temAcao;
            });

            filtrados.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = `border-b hover:bg-slate-50`;
                
                let labelDias = row.semData ? 'Sem Data' : `${row.diasSemAcao} dias`;
                let corBadge = row.diasSemAcao > 7 ? 'badge-atraso' : 'badge-ok';

                tr.innerHTML = `
                    <td class="text-center"><input type="checkbox" ${row.selecionado ? 'checked' : ''} onchange="updateSel('${row.CNPJ}', this.checked)"></td>
                    <td class="cnpj-cell" onclick="copiar('${row.CNPJ}')">${row.CNPJ}</td>
                    <td class="font-bold">${row['RAZÃO SOCIAL']}</td>
                    <td class="text-blue-800 font-semibold">${row['REDE ESTABELECIMENTO'] || '-'}</td>
                    <td>${row['USUARIO RESPONSAVEL']}</td>
                    <td class="text-right text-red-700 font-mono font-bold">R$ ${row['VALOR PENDENTE'] || '0,00'}</td>
                    <td class="text-center"><span class="${corBadge}">${labelDias}</span></td>
                `;
                body.appendChild(tr);
            });
            atualizarContadorSelecao();
        }

        function updateSel(cnpj, v) {
            const item = dados.find(d => d.CNPJ === cnpj);
            if(item) item.selecionado = v;
            atualizarContadorSelecao();
        }

        function atualizarContadorSelecao() {
            const total = dados.filter(d => d.selecionado).length;
            document.querySelectorAll('.countSel').forEach(el => el.innerText = total);
        }

        async function salvarAcao(cor) {
            const sel = dados.filter(d => d.selecionado);
            if (sel.length === 0) return;
            const response = await fetch(URL_SCRIPT, {
                method: 'POST',
                body: JSON.stringify({ updates: sel.map(i => ({ cnpj: i.CNPJ, cor: cor })) })
            });
            if (response.ok) {
                sel.forEach(i => { i['ACAO_SISTEMA'] = cor; i.selecionado = false; });
                render();
            }
        }

        function toggleModoFiltro() {
            apenasAtrasados = !apenasAtrasados;
            document.getElementById('btnModoFiltro').classList.toggle('btn-active');
            render();
        }

        function copiar(txt) { navigator.clipboard.writeText(txt); }

        function toggleAll(v) {
            dados.forEach(d => {
                const temAcao = d['ACAO_SISTEMA'] === 'VERDE' || d['ACAO_SISTEMA'] === 'VERMELHO';
                if (apenasAtrasados ? (d.diasSemAcao > 7 && !temAcao) : !temAcao) d.selecionado = v;
            });
            render();
        }

        baixarDados();
    </script>
</body>
</html>
