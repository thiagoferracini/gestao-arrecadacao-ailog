<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Arrecadação Ailog - Estratégico v14</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-size: 0.7rem; }
        .row-blue { background-color: #dbeafe !important; color: #1e3a8a; }
        .row-green { background-color: #dcfce7 !important; color: #166534; }
        .row-red { background-color: #fee2e2 !important; color: #991b1b; }
        .table-container { max-height: 70vh; overflow-y: auto; border: 1px solid #e5e7eb; }
        th { position: sticky; top: 0; background: #f8fafc; z-index: 10; border-bottom: 2px solid #e2e8f0; padding: 6px !important; }
        td { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-right: 1px solid #f1f5f9; padding: 4px !important; }
        .cnpj-cell { cursor: pointer; text-decoration: underline; color: #2563eb; font-weight: bold; }
        .btn-active { background-color: #1e3a8a !important; color: white !important; }
    </style>
</head>
<body class="bg-slate-100 p-2">

    <div class="max-w-[100%] mx-auto">
        <header class="flex flex-wrap justify-between items-center gap-2 mb-2 bg-white p-2 rounded shadow-sm border-b-2 border-blue-600">
            <div class="flex items-center gap-4">
                <h1 class="font-bold text-slate-700 uppercase tracking-tight">Painel Arrecadação - Estratégico</h1>
                <div id="cronometro" class="text-blue-700 font-mono font-bold bg-blue-50 px-2 py-1 rounded border border-blue-100">TEMPO: 00:00:00</div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="baixarDados()" class="bg-blue-600 text-white px-3 py-1.5 rounded text-[10px] font-bold hover:bg-blue-700">🔄 ATUALIZAR NUVEM</button>
                <button id="btnFiltroPendentes" onclick="toggleFiltroPendentes()" class="bg-white text-slate-700 border border-slate-300 px-3 py-1 rounded text-[10px] font-bold">👁️ APENAS PENDENTES</button>
                <button onclick="salvarAcao('VERMELHO')" class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700 text-[10px]">NÃO DISPARAR (<span class="countSel">0</span>)</button>
                <button onclick="salvarAcao('VERDE')" class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700 text-[10px]">E-MAIL ENVIADO (<span class="countSel">0</span>)</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-2 mb-2 bg-white p-2 rounded shadow-sm">
            <div class="flex items-center gap-2 border-r pr-2">
                <span class="font-bold text-slate-500">Analista:</span>
                <select id="filtroAnalista" onchange="render()" class="flex-1 bg-slate-50 border rounded px-1 py-0.5 outline-none"><option value="todos">Todos</option></select>
            </div>
            <div class="flex items-center gap-2 border-r pr-2">
                <span class="font-bold text-slate-500">Busca:</span>
                <input type="text" id="busca" oninput="render()" placeholder="CNPJ ou Razão..." class="flex-1 bg-slate-50 border rounded px-1 py-0.5 outline-none">
            </div>
            <div class="flex items-center gap-4 px-2 border-r text-[11px]">
                <div class="text-green-700 font-bold">CONCLUÍDOS: <span id="totalEnviados">0</span></div>
            </div>
            <div class="flex items-center justify-end text-blue-600 font-mono font-bold"><span id="resumo">Conectando...</span></div>
        </div>

        <div id="mainTable" class="bg-white rounded shadow-sm table-container">
            <table class="min-w-full table-fixed border-collapse">
                <thead>
                    <tr class="text-[9px] text-slate-500 uppercase">
                        <th class="w-8 p-1 text-center"><input type="checkbox" id="selectAll" onchange="toggleAll(this.checked)"></th>
                        <th class="w-24 p-1 text-left">CNPJ</th>
                        <th class="p-1 text-left">RAZÃO SOCIAL</th>
                        <th class="w-24 p-1 text-left">RESPONSÁVEL</th>
                        <th class="w-18 p-1 text-right text-red-500">PENDENTE</th>
                        <th class="w-18 p-1 text-center">ÚLT. CONTATO</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-[10px] text-slate-700"></tbody>
            </table>
        </div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbx7ZgKnvRz4OL4MhgNUEgVSy0ko3RoN5rQQx9A2T1TNHkS3rcmlsVxZgE8BK6nl3LM7_Q/exec"; 
        let dados = [];
        let tempoInicio = new Date();
        let filtroPendentesAtivo = false;

        // Inicia Cronômetro
        setInterval(() => {
            const diff = new Date(new Date() - tempoInicio);
            document.getElementById('cronometro').innerText = `TEMPO: ${String(diff.getUTCHours()).padStart(2,'0')}:${String(diff.getUTCMinutes()).padStart(2,'0')}:${String(diff.getUTCSeconds()).padStart(2,'0')}`;
        }, 1000);

        async function baixarDados() {
            document.getElementById('resumo').innerText = "Sincronizando...";
            try {
                const r = await fetch(URL_SCRIPT);
                const raw = await r.json();
                
                const hoje = new Date();
                dados = raw.filter(r => {
                    const status = String(r['STATUS'] || "").toUpperCase();
                    // Regra de 7 dias
                    const dataC = parseData(r['ULTIMO CONTATO']);
                    const difDias = Math.ceil(Math.abs(hoje - dataC) / (1000 * 60 * 60 * 24));
                    return status === "ATUALIZADO" && difDias > 7;
                })
                // Regra: Maior valor para o menor
                .sort((a, b) => parseFloat(b['VALOR PENDENTE'] || 0) - parseFloat(a['VALOR PENDENTE'] || 0));

                const analistas = [...new Set(dados.map(d => d['USUARIO RESPONSAVEL']))].sort();
                const combo = document.getElementById('filtroAnalista');
                combo.innerHTML = '<option value="todos">Todos</option>';
                analistas.forEach(a => { if(a) combo.innerHTML += `<option value="${a}">${a}</option>`; });

                render();
            } catch (e) { alert("Erro ao conectar."); }
        }

        function parseData(val) {
            if (!val) return new Date(2000, 0, 1);
            const p = String(val).split(' ')[0].split('/');
            return p.length === 3 ? new Date(p[2], p[1]-1, p[0]) : new Date(2000, 0, 1);
        }

        function toggleFiltroPendentes() {
            filtroPendentesAtivo = !filtroPendentesAtivo;
            document.getElementById('btnFiltroPendentes').classList.toggle('btn-active');
            render();
        }

        function render() {
            const analista = document.getElementById('filtroAnalista').value;
            const busca = document.getElementById('busca').value.toLowerCase();
            const body = document.getElementById('tableBody');
            body.innerHTML = '';

            const filtrados = dados.filter(d => {
                const matchA = analista === 'todos' || d['USUARIO RESPONSAVEL'] === analista;
                const matchB = d.CNPJ.includes(busca) || d['RAZÃO SOCIAL'].toLowerCase().includes(busca);
                const matchPendente = filtroPendentesAtivo ? (!d['ACAO_SISTEMA'] || d['ACAO_SISTEMA'] === "") : true;
                return matchA && matchB && matchPendente;
            });

            filtrados.forEach(row => {
                const tr = document.createElement('tr');
                const corClasse = row.cor_sessao === 'azul' ? 'row-blue' : row['ACAO_SISTEMA'] === 'VERDE' ? 'row-green' : row['ACAO_SISTEMA'] === 'VERMELHO' ? 'row-red' : '';
                tr.className = `border-b hover:bg-slate-50 ${corClasse}`;
                
                tr.innerHTML = `
                    <td class="text-center"><input type="checkbox" ${row.selecionado ? 'checked' : ''} onchange="updateSel('${row.CNPJ}', this.checked)"></td>
                    <td class="cnpj-cell" onclick="copiar('${row.CNPJ}')">${row.CNPJ}</td>
                    <td class="font-bold">${row['RAZÃO SOCIAL']}</td>
                    <td>${row['USUARIO RESPONSAVEL']}</td>
                    <td class="text-right text-red-600 font-mono">R$${row['VALOR PENDENTE'] || 0}</td>
                    <td class="text-center">${row['ULTIMO CONTATO'] || '-'}</td>
                `;
                body.appendChild(tr);
            });
            document.getElementById('resumo').innerText = `LISTADOS: ${filtrados.length}`;
            document.getElementById('totalEnviados').innerText = dados.filter(d => d['ACAO_SISTEMA'] === 'VERDE').length;
        }

        function updateSel(cnpj, v) {
            const item = dados.find(d => d.CNPJ === cnpj);
            if(item) item.selecionado = v;
            document.querySelectorAll('.countSel').forEach(el => el.innerText = dados.filter(d => d.selecionado).length);
        }

        async function salvarAcao(cor) {
            const sel = dados.filter(d => d.selecionado);
            if(sel.length === 0) return;
            if(!confirm(`Salvar ${sel.length} itens na nuvem?`)) return;

            document.getElementById('resumo').innerText = "Salvando...";
            for (let item of sel) {
                await fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify({ cnpj: item.CNPJ, cor: cor }) });
                item['ACAO_SISTEMA'] = cor;
                item.selecionado = false;
            }
            render();
            alert("Nuvem atualizada!");
        }

        function copiar(txt) {
            navigator.clipboard.writeText(txt);
            const item = dados.find(d => d.CNPJ === txt);
            if(item && !item['ACAO_SISTEMA']) { item.cor_sessao = 'azul'; render(); }
        }

        function toggleAll(v) {
            const analista = document.getElementById('filtroAnalista').value;
            dados.forEach(d => {
                if(analista === 'todos' || d['USUARIO RESPONSAVEL'] === analista) d.selecionado = v;
            });
            render();
        }

        baixarDados();
    </script>
</body>
</html>
