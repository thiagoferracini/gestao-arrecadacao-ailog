<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Arrecadação Ailog - v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-size: 0.7rem; }
        .row-red { background-color: #fee2e2 !important; color: #991b1b; }
        .row-green { background-color: #dcfce7 !important; color: #166534; }
        .table-container { max-height: 75vh; overflow-y: auto; border: 1px solid #e5e7eb; }
        th { position: sticky; top: 0; background: #f8fafc; z-index: 10; border-bottom: 2px solid #e2e8f0; }
        td { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-right: 1px solid #f1f5f9; }
        input[type="checkbox"] { cursor: pointer; }
    </style>
</head>
<body class="bg-slate-100 p-2">

    <div class="max-w-[100%] mx-auto">
        <header class="flex flex-wrap justify-between items-center gap-2 mb-2 bg-white p-2 rounded shadow-sm border-b-2 border-blue-500">
            <h1 class="font-bold text-slate-700 uppercase tracking-tight">Painel Arrecadação - Gestão de Operações</h1>
            
            <div class="flex gap-2">
                <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" class="hidden">
                <label for="fileInput" class="bg-slate-700 text-white px-3 py-1 rounded cursor-pointer hover:bg-slate-800 transition text-[10px]">
                    IMPORTAR PLANILHA
                </label>
                <button id="btnNaoDisparar" class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700 hidden text-[10px]">
                    NÃO DISPARAR (<span class="countSel">0</span>)
                </button>
                <button id="btnEmailEnviado" class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700 hidden text-[10px]">
                    E-MAIL ENVIADO (<span class="countSel">0</span>)
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-2 mb-2 bg-white p-2 rounded shadow-sm">
            <div class="flex items-center gap-2 border-r pr-2">
                <span class="font-bold text-slate-500">Analista:</span>
                <select id="filtroAnalista" class="flex-1 bg-slate-50 border rounded px-1 py-0.5 outline-none focus:ring-1 ring-blue-400">
                    <option value="todos">Todos</option>
                </select>
            </div>
            <div class="flex items-center gap-2 col-span-2">
                <span class="font-bold text-slate-500">Pesquisa Geral:</span>
                <input type="text" id="buscaGlobal" placeholder="Busque por CNPJ, Razão, Rede ou ID..." class="flex-1 bg-slate-50 border rounded px-1 py-0.5 outline-none focus:ring-1 ring-blue-400">
            </div>
            <div class="flex items-center justify-end text-blue-600 font-mono font-bold">
                <span id="infoResumo">Aguardando dados...</span>
            </div>
        </div>

        <div class="bg-white rounded shadow-sm table-container">
            <table class="min-w-full table-fixed border-collapse">
                <thead>
                    <tr class="text-[9px] text-slate-500">
                        <th class="w-8 p-1 text-center"><input type="checkbox" id="selectAll"></th>
                        <th class="w-10 p-1 text-left">ID</th>
                        <th class="w-24 p-1 text-left">CNPJ</th>
                        <th class="p-1 text-left">RAZÃO SOCIAL</th>
                        <th class="w-28 p-1 text-left bg-blue-50">REDE ESTABELECIMENTO</th>
                        <th class="w-24 p-1 text-left">RESPONSÁVEL</th>
                        <th class="w-14 p-1 text-right text-red-500">PENDENTE</th>
                        <th class="w-18 p-1 text-center">ÚLT. CONTATO</th>
                        <th class="w-16 p-1 text-center">STATUS</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-[10px] text-slate-700">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let dados = [];
        const hoje = new Date();

        // Inicialização de Eventos
        document.getElementById('fileInput').addEventListener('change', carregarPlanilha);
        document.getElementById('filtroAnalista').addEventListener('change', render);
        document.getElementById('buscaGlobal').addEventListener('input', render);
        document.getElementById('selectAll').addEventListener('change', toggleTodosVisiveis);
        document.getElementById('btnNaoDisparar').addEventListener('click', () => acaoEmMassa('vermelho'));
        document.getElementById('btnEmailEnviado').addEventListener('click', () => acaoEmMassa('verde'));

        function carregarPlanilha(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                const wb = XLSX.read(evt.target.result, { type: 'binary' });
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                processar(json);
            };
            reader.readAsBinaryString(file);
        }

        function processar(rows) {
            // Filtro de 7 dias e limpeza de dados
            dados = rows.filter(r => {
                if (!r['ULTIMO CONTATO']) return true;
                const dataC = parseData(r['ULTIMO CONTATO']);
                const dif = Math.ceil(Math.abs(hoje - dataC) / (1000 * 60 * 60 * 24));
                return dif > 7;
            }).map(r => ({ 
                ...r, 
                cor: '', 
                selecionado: false,
                // Garantir que campos de busca existam como string
                redeBusca: String(r['REDE ESTABELECIMENTO'] || '').toLowerCase(),
                razaoBusca: String(r['RAZÃO SOCIAL'] || '').toLowerCase()
            }));

            // Popular Analistas
            const analistas = [...new Set(dados.map(d => d['USUARIO RESPONSAVEL']))].sort();
            const combo = document.getElementById('filtroAnalista');
            combo.innerHTML = '<option value="todos">Todos</option>';
            analistas.forEach(a => { if(a) combo.innerHTML += `<option value="${a}">${a}</option>`; });

            document.getElementById('btnNaoDisparar').classList.remove('hidden');
            document.getElementById('btnEmailEnviado').classList.remove('hidden');
            render();
        }

        function parseData(d) {
            if (typeof d === 'number') return new Date((d - 25569) * 86400 * 1000);
            const p = d.split(' ')[0].split('/');
            return new Date(p[2], p[1] - 1, p[0]);
        }

        function render() {
            const analista = document.getElementById('filtroAnalista').value;
            const busca = document.getElementById('buscaGlobal').value.toLowerCase();
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            document.getElementById('selectAll').checked = false;

            const filtrados = dados.filter(d => {
                const matchAnalista = analista === 'todos' || d['USUARIO RESPONSAVEL'] === analista;
                const matchBusca = !busca || 
                    String(d.ID).includes(busca) || 
                    String(d.CNPJ).includes(busca) || 
                    d.razaoBusca.includes(busca) || 
                    d.redeBusca.includes(busca);
                
                return matchAnalista && matchBusca;
            });

            filtrados.forEach(row => {
                const tr = document.createElement('tr');
                const cssCor = row.cor === 'vermelho' ? 'row-red' : (row.cor === 'verde' ? 'row-green' : '');
                tr.className = `border-b hover:bg-slate-50 cursor-pointer ${cssCor}`;
                
                tr.innerHTML = `
                    <td class="p-1 text-center"><input type="checkbox" ${row.selecionado ? 'checked' : ''} onclick="event.stopPropagation(); updateSel(${row.ID}, this.checked)"></td>
                    <td class="p-1 text-slate-400">${row.ID || ''}</td>
                    <td class="p-1 font-mono">${row.CNPJ || ''}</td>
                    <td class="p-1 font-bold" title="${row['RAZÃO SOCIAL']}">${row['RAZÃO SOCIAL'] || ''}</td>
                    <td class="p-1 italic text-slate-600" title="${row['REDE ESTABELECIMENTO']}">${row['REDE ESTABELECIMENTO'] || '-'}</td>
                    <td class="p-1">${row['USUARIO RESPONSAVEL'] || ''}</td>
                    <td class="p-1 text-right font-mono text-red-600">R$${row['VALOR PENDENTE'] || 0}</td>
                    <td class="p-1 text-center">${row['ULTIMO CONTATO'] ? row['ULTIMO CONTATO'].split(' ')[0] : '-'}</td>
                    <td class="p-1 text-center"><span class="bg-slate-100 px-1 rounded-sm text-[8px] border">${row.STATUS || ''}</span></td>
                `;
                
                tr.onclick = () => alternarCorManual(row.ID, row.cor);
                body.appendChild(tr);
            });

            document.getElementById('infoResumo').innerText = `LISTADOS: ${filtrados.length}`;
            atualizarContador();
        }

        function updateSel(id, val) {
            const item = dados.find(d => d.ID === id);
            if (item) item.selecionado = val;
            atualizarContador();
        }

        function toggleTodosVisiveis(e) {
            const analista = document.getElementById('filtroAnalista').value;
            const busca = document.getElementById('buscaGlobal').value.toLowerCase();
            const val = e.target.checked;

            dados.forEach(d => {
                const matchAnalista = analista === 'todos' || d['USUARIO RESPONSAVEL'] === analista;
                const matchBusca = !busca || 
                    String(d.ID).includes(busca) || 
                    String(d.CNPJ).includes(busca) || 
                    d.razaoBusca.includes(busca) || 
                    d.redeBusca.includes(busca);

                if (matchAnalista && matchBusca) {
                    d.selecionado = val;
                }
            });
            render();
        }

        function alternarCorManual(id, corAtual) {
            const item = dados.find(d => d.ID === id);
            if (corAtual !== '') {
                if (!confirm("Deseja remover a sinalização colorida deste posto?")) return;
                item.cor = '';
            } else {
                item.cor = 'vermelho'; // Padrão ao clicar
            }
            render();
        }

        function acaoEmMassa(novaCor) {
            const selecionados = dados.filter(d => d.selecionado);
            if (selecionados.length === 0) return alert("Selecione os itens desejados na caixa de marcação.");

            const acao = novaCor === 'verde' ? 'E-MAIL ENVIADO' : 'NÃO DISPARAR';
            if (confirm(`Confirmar ação [${acao}] para ${selecionados.length} postos?`)) {
                selecionados.forEach(d => {
                    d.cor = novaCor;
                    d.selecionado = false;
                });
                render();
            }
        }

        function atualizarContador() {
            const total = dados.filter(d => d.selecionado).length;
            document.querySelectorAll('.countSel').forEach(el => el.innerText = total);
        }
    </script>
</body>
</html>
