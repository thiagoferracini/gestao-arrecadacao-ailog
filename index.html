<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Arrecadação Ailog - v7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-size: 0.7rem; }
        /* Cores das Linhas */
        .row-blue { background-color: #dbeafe !important; color: #1e3a8a; } /* Em atendimento */
        .row-green { background-color: #dcfce7 !important; color: #166534; } /* Enviado */
        .row-red { background-color: #fee2e2 !important; color: #991b1b; } /* Não disparar */
        
        .table-container { max-height: 70vh; overflow-y: auto; border: 1px solid #e5e7eb; }
        th { position: sticky; top: 0; background: #f8fafc; z-index: 10; border-bottom: 2px solid #e2e8f0; }
        td { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-right: 1px solid #f1f5f9; }
        
        /* Alerta de Cópia */
        .copy-badge { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1e3a8a; color: white; padding: 5px 15px; border-radius: 20px; z-index: 100; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        /* Estilo do CNPJ clicável */
        .cnpj-cell { cursor: pointer; text-decoration: underline; color: #2563eb; }
        .cnpj-cell:hover { color: #1e40af; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-slate-100 p-2">

    <div id="copyAlert" class="copy-badge text-[10px] font-bold uppercase">CNPJ Copiado e Linha em Azul</div>

    <div class="max-w-[100%] mx-auto">
        <header class="flex flex-wrap justify-between items-center gap-2 mb-2 bg-white p-2 rounded shadow-sm border-b-2 border-blue-600">
            <div class="flex items-center gap-4">
                <h1 class="font-bold text-slate-700 uppercase tracking-tight">Painel Arrecadação Ailog</h1>
                <div id="cronometro" class="text-blue-700 font-mono font-bold bg-blue-50 px-2 py-1 rounded border border-blue-100 hidden">
                    TEMPO: 00:00:00
                </div>
            </div>
            
            <div class="flex gap-2">
                <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" class="hidden">
                <label for="fileInput" id="labelImport" class="bg-slate-700 text-white px-3 py-1 rounded cursor-pointer hover:bg-slate-800 transition text-[10px]">
                    IMPORTAR PLANILHA
                </label>
                <button id="btnNaoDisparar" class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700 hidden text-[10px]">
                    NÃO DISPARAR (<span class="countSel">0</span>)
                </button>
                <button id="btnEmailEnviado" class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700 hidden text-[10px]">
                    E-MAIL ENVIADO (<span class="countSel">0</span>)
                </button>
                <button id="btnZerar" class="bg-orange-500 text-white px-3 py-1 rounded hover:bg-orange-600 hidden text-[10px] font-bold">
                    FINALIZAR / ZERAR
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-2 mb-2 bg-white p-2 rounded shadow-sm">
            <div class="flex items-center gap-2 border-r pr-2">
                <span class="font-bold text-slate-500">Analista:</span>
                <select id="filtroAnalista" class="flex-1 bg-slate-50 border rounded px-1 py-0.5 outline-none">
                    <option value="todos">Todos</option>
                </select>
            </div>
            <div class="flex items-center gap-2 border-r pr-2">
                <span class="font-bold text-slate-500">Busca:</span>
                <input type="text" id="buscaGlobal" placeholder="CNPJ, Razão, Rede..." class="flex-1 bg-slate-50 border rounded px-1 py-0.5 outline-none">
            </div>
            <div class="flex items-center gap-4 px-2 border-r text-[11px]">
                <div class="text-green-700 font-bold">ENVIADOS: <span id="totalEnviados">0</span></div>
                <div class="text-slate-500 italic">PENDENTES: <span id="countPendentes">0</span></div>
            </div>
            <div class="flex items-center justify-end text-blue-600 font-mono font-bold">
                <span id="infoResumo">Aguardando planilha...</span>
            </div>
        </div>

        <div id="mainTable" class="bg-white rounded shadow-sm table-container hidden">
            <table class="min-w-full table-fixed border-collapse">
                <thead>
                    <tr class="text-[9px] text-slate-500">
                        <th class="w-8 p-1 text-center"><input type="checkbox" id="selectAll"></th>
                        <th class="w-10 p-1 text-left">ID</th>
                        <th
