<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Arrecadação Ailog - v28 Estável</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-size: 0.7rem; }
        .row-blue { background-color: #dbeafe !important; color: #1e3a8a; }
        .table-container { max-height: 75vh; overflow-y: auto; border: 1px solid #e5e7eb; }
        th { position: sticky; top: 0; background: #f8fafc; z-index: 10; border-bottom: 2px solid #e2e8f0; padding: 6px !important; }
        td { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-right: 1px solid #f1f5f9; padding: 4px !important; }
        .cnpj-cell { cursor: pointer; text-decoration: underline; color: #2563eb; font-weight: bold; }
        .btn-active { background-color: #1e3a8a !important; color: white !important; }
        .badge-atraso { background: #b91c1c; color: white; padding: 2px 5px; border-radius: 4px; font-weight: bold; font-size: 9px; }
    </style>
</head>
<body class="bg-slate-100 p-2">

    <div class="max-w-[100%] mx-auto">
        <header class="flex flex-wrap justify-between items-center gap-2 mb-2 bg-white p-2 rounded shadow-sm border-b-2 border-red-600">
            <div class="flex items-center gap-4">
                <h1 class="font-bold text-slate-700 uppercase tracking-tight">Fila de Disparo - Ailog v28</h1>
                <div id="cronometro" class="text-blue-700 font-mono font-bold bg-blue-50 px-2 py-1 rounded border border-blue-100 text-[10px]">00:00:00</div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="baixarDados()" class="bg-slate-600 text-white px-3 py-1.5 rounded text-[10px] font-bold hover:bg-slate-700">🔄 ATUALIZAR</button>
                <button id="btnModoFiltro" onclick="toggleModoFiltro()" class="bg-white text-slate-700 border border-slate-300 px-3 py-1 rounded text-[10px] font-bold btn-active">👁️ APENAS ATRASADOS (+7D)</button>
                <button onclick="salvarAcao('VERMELHO')" class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700 text-[10px] font-bold">NÃO DISPARAR (<span class="countSel">0</span>)</button>
                <button onclick="salvarAcao('VERDE')" class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700 text-[10px] font-bold">E-MAIL ENVIADO (<span class="countSel">0</span>)</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-2 mb-2 bg-white p-2 rounded shadow-sm border-l-4 border-red-600">
            <div class="flex items-center gap-2 border-r pr-2">
                <span class="font-bold text-slate-500 uppercase text-[9px]">Analista:</span>
                <select id="filtroAnalista" onchange="render()" class="flex-1 bg-slate-50 border rounded px-1 py-0.5 outline-none font-bold text-slate-700"><option value="todos">Todos</option></select>
            </div>
            <div class="flex items-center gap-2 border-r pr-2">
                <span class="font-bold text-slate-500 uppercase text-[9px]">Busca:</span>
                <input type="text" id="busca" oninput="render()" placeholder="CNPJ ou Razão..." class="flex-1 bg-slate-50 border rounded px-1 py-0.5 outline-none text-[10px]">
            </div>
            <div class="flex items-center gap-4 px-2 border-r text-[10px]">
                <div class="text-red-700 font-bold uppercase">Críticos (+7d): <span id="totalCriticos">0</span></div>
            </div>
            <div class="flex items-center justify-end text-blue-600 font-mono font-bold">
                <span id="resumo" class="uppercase text-[9px]">Carregando...</span>
            </div>
        </div>

        <div id="mainTable" class="bg-white rounded shadow-sm table-container">
            <table class="min-w-full table-fixed border-collapse">
                <thead>
                    <tr class="text-[9px] text-slate-500 uppercase bg-slate-50 font-bold">
                        <th class="w-8 p-1 text-center border-r"><input type="checkbox" id="selectAll" onchange="toggleAll(this.checked)"></th>
                        <th class="w-24 p-1 text-left border-r">CNPJ</th>
                        <th class="p-1 text-left border-r">RAZÃO SOCIAL</th>
                        <th class="w-32 p-1 text-left border-r text-blue-800">REDE</th>
                        <th class="w-24 p-1 text-left border-r">RESPONSÁVEL</th>
                        <th class="w-24 p-1 text-right border-r text-red-600 italic">▼ VALOR PENDENTE</th>
                        <th class="w-24 p-1 text-center font-bold">DIAS SEM AÇÃO</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-[10px] text-slate-700"></tbody>
            </table>
        </div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzTLydhGGcvI5qAHlBNEP9aX9IEy1RwDJJ8ThhZJI8UwVFe1U-Hx-gImIiSZjWLJxj7ow/exec"; 
        let dados = [];
        let tempoInicio = new Date();
        let apenasAtrasados = true; 

        setInterval(() => {
            const diff = new Date(new Date() - tempoInicio);
            document.getElementById('cronometro').innerText = `${String(diff.getUTCHours()).padStart(2,'0')}:${String(diff.getUTCMinutes()).padStart(2,'0')}:${String(diff.getUTCSeconds()).padStart(2,'0')}`;
        }, 1000);

        async function baixarDados() {
            document.getElementById('resumo').innerText = "Conectando...";
            try {
                const response = await fetch(URL_SCRIPT);
                const raw = await response.json();
                const hoje = new Date();
                hoje.setHours(0,0,0,0);

                dados = raw.filter(r => String(r['STATUS'] || "").toUpperCase() === "ATUALIZADO")
                .map(r => {
                    try {
                        // Limpeza de chaves para evitar o erro do espaço no "ULTIMO CONTATO "
                        const limpo = {};
                        Object.keys(r).forEach(k => limpo[k.trim()] = r[k]);

                        const dataBruta = limpo['ULTIMO CONTATO'] || limpo['ÚLTIMO CONTATO'] || "";
                        const dataC = parseDataAilog(dataBruta);
                        
                        let dif = 0;
                        if (dataC) {
                            const timeDiff = hoje.getTime() - dataC.getTime();
                            dif = Math.floor(timeDiff / (1000 * 3600 * 24));
                        }
                        
                        let vOriginal = String(limpo['VALOR PENDENTE'] || "0");
                        let vNumerico = parseFloat(vOriginal.replace("R$", "").replace(/\./g, "").replace(",", ".").trim()) || 0;

                        return { 
                            ...limpo, 
                            diasSemAcao: dif, 
                            valorNumerico: vNumerico, 
                            selecionado: false, 
                            semData: !dataC 
                        };
                    } catch(err) { return null; }
                }).filter(x => x !== null);

                // Popular Filtro de Analista
                const analistas = [...new Set(dados.map(d => d['USUARIO RESPONSAVEL']))].filter(Boolean).sort();
                const combo = document.getElementById('filtroAnalista');
                combo.innerHTML = '<option value="todos">Todos</option>';
                analistas.forEach(a => combo.innerHTML += `<option value="${a}">${a}</option>`);

                render();
            } catch (e) { 
                document.getElementById('resumo').innerText = "Erro ao Carregar";
                console.error(e);
            }
        }

        function parseDataAilog(val) {
            if (!val) return null;
            try {
                const dataParte = String(val).split(' ')[0]; // Pega 29/08/2024
                const dmy = dataParte.split('/');
                if (dmy.length === 3) {
                    return new Date(parseInt(dmy[2],10), parseInt(dmy[1],10)-1, parseInt(dmy[0],10));
                }
            } catch (e) { return null; }
            return null;
        }

        function render() {
            const analista = document.getElementById('filtroAnalista').value;
            const busca = document.getElementById('busca').value.toLowerCase();
            const body = document.getElementById('tableBody');
            body.innerHTML = '';

            const filtrados = dados.filter(d => {
                const matchA = analista === 'todos' || d['USUARIO RESPONSAVEL'] === analista;
                const matchB = `${d.CNPJ} ${d['RAZÃO SOCIAL']}`.toLowerCase().includes(busca);
                const temAcao = d['ACAO_SISTEMA'] === 'VERDE' || d['ACAO_SISTEMA'] === 'VERMELHO';
                const matchAtraso = apenasAtrasados ? (d.diasSemAcao > 7 && !temAcao) : !temAcao;
                return matchA && matchB && matchAtraso;
            }).sort((a, b) => b.valorNumerico - a.valorNumerico);

            filtrados.forEach(row => {
                const tr = document.createElement('tr');
                const corClasse = row.cor_sessao === 'azul' ? 'row-blue' : '';
                tr.className = `border-b hover:bg-slate-50 ${corClasse}`;
                
                tr.innerHTML = `
                    <td class="text-center"><input type="checkbox" ${row.selecionado ? 'checked' : ''} onchange="updateSel('${row.CNPJ}', this.checked)"></td>
                    <td class="cnpj-cell" onclick="copiar('${row.CNPJ}')">${row.CNPJ}</td>
                    <td class="font-bold">${row['RAZÃO SOCIAL']}</td>
                    <td class="text-blue-800 font-semibold">${row['REDE ESTABELECIMENTO'] || '-'}</td>
                    <td>${row['USUARIO RESPONSAVEL']}</td>
                    <td class="text-right text-red-700 font-mono font-bold">R$ ${row['VALOR PENDENTE'] || '0,00'}</td>
                    <td class="text-center"><span
