<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Arrecadação Ailog - Precisão v21</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-size: 0.7rem; }
        .row-blue { background-color: #dbeafe !important; color: #1e3a8a; }
        .row-green { background-color: #dcfce7 !important; color: #166534; }
        .row-red { background-color: #fee2e2 !important; color: #991b1b; }
        .row-recent { background-color: #f8fafc; opacity: 0.8; } 
        .table-container { max-height: 70vh; overflow-y: auto; border: 1px solid #e5e7eb; }
        th { position: sticky; top: 0; background: #f8fafc; z-index: 10; border-bottom: 2px solid #e2e8f0; padding: 6px !important; }
        td { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-right: 1px solid #f1f5f9; padding: 4px !important; }
        .cnpj-cell { cursor: pointer; text-decoration: underline; color: #2563eb; font-weight: bold; }
        .btn-active { background-color: #1e3a8a !important; color: white !important; }
        .badge-alert { background: #fee2e2; color: #b91c1c; padding: 2px 4px; border-radius: 4px; font-weight: bold; font-size: 8px; border: 1px solid #fecaca; }
    </style>
</head>
<body class="bg-slate-100 p-2">

    <div class="max-w-[100%] mx-auto">
        <header class="flex flex-wrap justify-between items-center gap-2 mb-2 bg-white p-2 rounded shadow-sm border-b-2 border-blue-600">
            <div class="flex items-center gap-4">
                <h1 class="font-bold text-slate-700 uppercase tracking-tight">Arrecadação - Sincronização de Seleção</h1>
                <div id="cronometro" class="text-blue-700 font-mono font-bold bg-blue-50 px-2 py-1 rounded border border-blue-100">00:00:00</div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="baixarDados()" class="bg-slate-600 text-white px-3 py-1.5 rounded text-[10px] font-bold hover:bg-slate-700">🔄 ATUALIZAR</button>
                <button onclick="selecionarCriticos()" class="bg-orange-500 text-white px-3 py-1.5 rounded text-[10px] font-bold hover:bg-orange-600 shadow-sm">🎯 SELECIONAR +7 DIAS</button>
                <button id="btnFiltroPendentes" onclick="toggleFiltroPendentes()" class="bg-white text-slate-700 border border-slate-300 px-3 py-1 rounded text-[10px] font-bold btn-active">👁️ PENDENTES</button>
                <button onclick="salvarAcao('VERMELHO')" class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700 text-[10px] font-bold">NÃO DISPARAR (<span class="countSel">0</span>)</button>
                <button onclick="salvarAcao('VERDE')" class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700 text-[10px] font-bold">E-MAIL ENVIADO (<span class="countSel">0</span>)</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-2 mb-2 bg-white p-2 rounded shadow-sm border-l-4 border-blue-500">
            <div class="flex items-center gap-2 border-r pr-2">
                <span class="font-bold text-slate-500 uppercase text-[9px]">Analista:</span>
                <select id="filtroAnalista" onchange="render()" class="flex-1 bg-slate-50 border rounded px-1 py-0.5 outline-none font-bold"><option value="todos">Todos</option></select>
            </div>
            <div class="flex items-center gap-2 border-r pr-2">
                <span class="font-bold text-slate-500 uppercase text-[9px]">Busca:</span>
                <input type="text" id="busca" oninput="render()" placeholder="CNPJ, Razão ou Rede..." class="flex-1 bg-slate-50 border rounded px-1 py-0.5 outline-none">
            </div>
            <div class="flex items-center gap-4 px-2 border-r text-[10px]">
                <div class="text-orange-600 font-bold uppercase">Atrasados (+7d): <span id="totalCriticos">0</span></div>
            </div>
            <div class="flex items-center justify-end text-blue-600 font-mono font-bold">
                <span id="resumo" class="uppercase text-[9px]">Aguardando Sincronização...</span>
            </div>
        </div>

        <div id="mainTable" class="bg-white rounded shadow-sm table-container">
            <table class="min-w-full table-fixed border-collapse">
                <thead>
                    <tr class="text-[9px] text-slate-500 uppercase bg-slate-50">
                        <th class="w-8 p-1 text-center border-r"><input type="checkbox" id="selectAll" onchange="toggleAll(this.checked)"></th>
                        <th class="w-24 p-1 text-left border-r">CNPJ</th>
                        <th class="p-1 text-left border-r">RAZÃO SOCIAL</th>
                        <th class="w-32 p-1 text-left border-r bg-blue-50/30">REDE</th>
                        <th class="w-24 p-1 text-left border-r">RESPONSÁVEL</th>
                        <th class="w-24 p-1 text-right border-r font-black text-red-600 italic">▼ VALOR PENDENTE</th>
                        <th class="w-24 p-1 text-center">ÚLT. CONTATO</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-[10px] text-slate-700"></tbody>
            </table>
        </div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzTLydhGGcvI5qAHlBNEP9aX9IEy1RwDJJ8ThhZJI8UwVFe1U-Hx-gImIiSZjWLJxj7ow/exec"; 
        let dados = [];
        let tempoInicio = new Date();
        let filtroPendentesAtivo = true;

        setInterval(() => {
            const diff = new Date(new Date() - tempoInicio);
            document.getElementById('cronometro').innerText = `${String(diff.getUTCHours()).padStart(2,'0')}:${String(diff.getUTCMinutes()).padStart(2,'0')}:${String(diff.getUTCSeconds()).padStart(2,'0')}`;
        }, 1000);

        async function baixarDados() {
            document.getElementById('resumo').innerText = "Lendo Planilha...";
            try {
                const r = await fetch(URL_SCRIPT);
                const raw = await r.json();
                const hoje = new Date();

                dados = raw.filter(r => String(r['STATUS']).toUpperCase() === "ATUALIZADO")
                .map(r => {
                    const dataC = parseData(r['ULTIMO CONTATO']);
                    const dif = Math.ceil((hoje - dataC) / (1000 * 60 * 60 * 24));
                    let valorLimpo = String(r['VALOR PENDENTE'] || "0").replace("R$", "").replace(/\./g, "").replace(",", ".").trim();
                    return { ...r, diasSemAcao: dif, valorNumerico: parseFloat(valorLimpo) || 0, selecionado: false };
                })
                .sort((a, b) => b.valorNumerico - a.valorNumerico);

                const analistas = [...new Set(dados.map(d => d['USUARIO RESPONSAVEL']))].sort();
                const combo = document.getElementById('filtroAnalista');
                combo.innerHTML = '<option value="todos">Todos</option>';
                analistas.forEach(a => { if(a) combo.innerHTML += `<option value="${a}">${a}</option>`; });

                render();
            } catch (e) { alert("Erro de conexão."); }
        }

        function parseData(val) {
            if (!val) return new Date(2000, 0, 1);
            const p = String(val).split(' ')[0].split('/');
            return p.length === 3 ? new Date(p[2], p[1]-1, p[0]) : new Date(2000, 0, 1);
        }

        // CORREÇÃO: Função de desmarcação agora atualiza o objeto corretamente
        function updateSel(cnpj, v) {
            const item = dados.find(d => d.CNPJ === cnpj);
            if(item) {
                item.selecionado = v;
                // Se desmarcar um, remove o "Selecionar Todos" do topo
                if(!v) document.getElementById('selectAll').checked = false;
            }
            atualizarContadorSelecao();
        }

        function selecionarCriticos() {
            const analista = document.getElementById('filtroAnalista').value;
            dados.forEach(d => {
                const matchA = analista === 'todos' || d['USUARIO RESPONSAVEL'] === analista;
                const semAcao = !d['ACAO_SISTEMA'];
                if (matchA && semAcao && d.diasSemAcao > 7) d.selecionado = true;
            });
            render();
        }

        function render() {
            const analista = document.getElementById('filtroAnalista').value;
            const busca = document.getElementById('busca').value.toLowerCase();
            const body = document.getElementById('tableBody');
            body.innerHTML = '';

            const filtrados = dados.filter(d => {
                const matchA = analista === 'todos' || d['USUARIO RESPONSAVEL'] === analista;
                const txt = `${d.CNPJ} ${d['RAZÃO SOCIAL']} ${d['REDE ESTABELECIMENTO'] || ''}`.toLowerCase();
                const matchB = txt.includes(busca);
                const temAcao = d['ACAO_SISTEMA'] === 'VERDE' || d['ACAO_SISTEMA'] === 'VERMELHO';
                const matchP = filtroPendentesAtivo ? !temAcao : true;
                return matchA && matchB && matchP;
            });

            filtrados.forEach(row => {
                const tr = document.createElement('tr');
                const acao = row['ACAO_SISTEMA'];
                const ehCritico = row.diasSemAcao > 7 && !acao;
                let corClasse = row.cor_sessao === 'azul' ? 'row-blue' : acao === 'VERDE' ? 'row-green' : acao === 'VERMELHO' ? 'row-red' : '';
                if (!corClasse && row.diasSemAcao <= 7) corClasse = 'row-recent';

                tr.className = `border-b hover:bg-slate-50 ${corClasse}`;
                tr.innerHTML = `
                    <td class="text-center"><input type="checkbox" ${row.selecionado ? 'checked' : ''} onchange="updateSel('${row.CNPJ}', this.checked)"></td>
                    <td class="cnpj-cell" onclick="copiar('${row.CNPJ}')">${row.CNPJ}</td>
                    <td class="font-bold">${row['RAZÃO SOCIAL']}</td>
                    <td class="text-blue-800 font-semibold">${row['REDE ESTABELECIMENTO'] || '-'}</td>
                    <td>${row['USUARIO RESPONSAVEL']}</td>
                    <td class="text-right text-red-700 font-mono font-bold">R$ ${row['VALOR PENDENTE'] || '0,00'}</td>
                    <td class="text-center font-semibold">
                        ${String(row['ULTIMO CONTATO'] || '-').split(' ')[0]}
                        ${ehCritico ? `<br><span class="badge-alert">${row.diasSemAcao} DIAS</span>` : ''}
                    </td>
                `;
                body.appendChild(tr);
            });
            document.getElementById('totalCriticos').innerText = dados.filter(d => d.diasSemAcao > 7 && !d['ACAO_SISTEMA']).length;
            document.getElementById('resumo').innerText = `LISTADOS: ${filtrados.length}`;
            atualizarContadorSelecao();
        }

        function atualizarContadorSelecao() {
            const total = dados.filter(d => d.selecionado).length;
            document.querySelectorAll('.countSel').forEach(el => el.innerText = total);
        }

        async function salvarAcao(cor) {
            // Pega APENAS quem realmente está com o objeto selecionado como true
            const sel = dados.filter(d => d.selecionado);
            if (sel.length === 0) return alert("Nenhum item selecionado para salvar.");
            
            if (!confirm(`Confirmar ação em lote para ${sel.length} itens?`)) return;

            document.getElementById('resumo').innerText = "Sincronizando lote...";
            try {
                const response = await fetch(URL_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({ updates: sel.map(i => ({ cnpj: i.CNPJ, cor: cor })) })
                });
                if (response.ok) {
                    sel.forEach(i => { i['ACAO_SISTEMA'] = cor; i.selecionado = false; i.cor_sessao = ''; });
                    document.getElementById('selectAll').checked = false;
                    render();
                    alert("Salvo com sucesso!");
                }
            } catch (e) { alert("Erro ao salvar."); }
            finally { document.getElementById('resumo').innerText = "Sincronizado"; }
        }

        function toggleFiltroPendentes() {
            filtroPendentesAtivo = !filtroPendentesAtivo;
            document.getElementById('btnFiltroPendentes').classList.toggle('btn-active');
            render();
        }

        function copiar(txt) {
            navigator.clipboard.writeText(txt);
            const item = dados.find(d => d.CNPJ === txt);
            if(item && !item['ACAO_SISTEMA']) { item.cor_sessao = 'azul'; render(); }
        }

        function toggleAll(v) {
            const analista = document.getElementById('filtroAnalista').value;
            const busca = document.getElementById('busca').value.toLowerCase();
            
            // Só marca quem está VISÍVEL com base nos filtros atuais
            dados.forEach(d => {
                const txt = `${d.CNPJ} ${d['RAZÃO SOCIAL']} ${d['REDE ESTABELECIMENTO'] || ''}`.toLowerCase();
                const matchA = analista === 'todos' || d['USUARIO RESPONSAVEL'] === analista;
                const matchB = txt.includes(busca);
                const temAcao = d['ACAO_SISTEMA'] === 'VERDE' || d['ACAO_SISTEMA'] === 'VERMELHO';
                const matchP = filtroPendentesAtivo ? !temAcao : true;

                if (matchA && matchB && matchP) {
                    d.selecionado = v;
                }
            });
            render();
        }

        baixarDados();
    </script>
</body>
</html>
